services:
  postgres:
    image: postgres:16-alpine
    container_name: transit_postgres
    environment:
      POSTGRES_DB: transit_db
      POSTGRES_USER: transit_user
      POSTGRES_PASSWORD: transit_pass
    ports:
      - "5432:5432"
    volumes:
      - transit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transit_user -d transit_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: transit_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@transit.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  transit_pgdata:
